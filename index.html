<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soha's Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Task Manager Pro</h1>
            <p class="subtitle">Organize your academic and personal projects</p>
        </header>

        <div class="task-input-section">
            <input type="text" id="taskInput" placeholder="What needs to be done?" maxlength="100">
            <select id="taskCategory">
                <option value="Dev Project">Dev Project</option>
                <option value="Assignment">Assignment</option>
                <option value="Personal">Personal</option>
            </select>
            <button id="addBtn">Add Task</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="taskList"></ul>
        
        <div class="stats">
            <span id="taskCount">0 tasks</span>
            <button id="clearCompletedBtn">Clear Completed</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
